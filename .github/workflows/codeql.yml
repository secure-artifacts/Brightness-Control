name: CodeQL

on:
  push:
    branches: [ "main" ]        # ✅ 只在主分支 push 时触发，不是所有分支
  pull_request:
    branches: [ "main" ]        # ✅ 只分析目标 main 的 PR
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # ✅ 缓存 SPM 依赖，避免每次重新下载
      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/.spm-cache
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # ✅ 缓存 DerivedData，实现增量编译
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-derived-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      # 关键：SWIFT_ENABLE_EXPLICIT_MODULES=NO
      # CodeQL swift extractor (2.25.6) 与 Xcode 的 Explicit Modules 编译模型不兼容。
      # 显式模块默认开启时，Xcode 把编译拆成独立的 emit-module + compile 阶段，
      # extractor 只截到 emit-module 调用、提取不到源码，finalize 报
      # "CodeQL could not process any code / no source code seen during build"。
      # 关掉显式模块退回经典编译模型即可正常提取（已用 codeql 2.25.6 本地复现并验证修复）。
      - name: Build project
        run: |
          xcodebuild build \
            -project "Brightness Control.xcodeproj" \
            -scheme "Brightness Control" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
